<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Simple toggle switch styling */
        .dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .dot { transform: translateX(100%); background-color: white; }
        input:checked ~ .block { background-color: #22c55e; }
    </style>
</head>
<body class="bg-gray-50 p-10 font-sans">

    <div class="max-w-5xl mx-auto flex gap-20">
        
        <div class="flex-1">
            <h2 class="text-3xl font-semibold mb-8 text-center">Restricted Apps</h2>
            <div class="grid grid-cols-2 gap-y-8 gap-x-12">
                <div class="flex items-center justify-between">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="h-12 w-20 object-contain" alt="Netflix">
                    <label class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" class="sr-only toggle-input" checked>
                            <div class="block bg-gray-300 w-14 h-8 rounded-full"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-green-500">ON</div>
                        </div>
                    </label>
                </div>

                <div class="flex items-center justify-between">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="h-10 w-10 object-contain" alt="Instagram">
                    <label class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" class="sr-only toggle-input" checked>
                            <div class="block bg-gray-300 w-14 h-8 rounded-full"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-green-500">ON</div>
                        </div>
                    </label>
                </div>

                <div class="flex items-center justify-between">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/70/Roblox_Corporation_2025_logo.svg" class="h-10 w-10 object-contain" alt="Roblox">
                    <label class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" class="sr-only toggle-input" checked>
                            <div class="block bg-gray-300 w-14 h-8 rounded-full"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-green-500">ON</div>
                        </div>
                    </label>
                </div>

                <div class="flex items-center justify-between">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="h-10 w-10 object-contain" alt="Facebook">
                    <label class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" class="sr-only toggle-input">
                            <div class="block bg-gray-300 w-14 h-8 rounded-full"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-gray-400">OFF</div>
                        </div>
                    </label>
                </div>

                <div class="flex items-center justify-between">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" class="h-10 w-12 object-contain" alt="YouTube">
                    <label class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" class="sr-only toggle-input">
                            <div class="block bg-gray-300 w-14 h-8 rounded-full"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-gray-400">OFF</div>
                        </div>
                    </label>
                </div>

                <div class="flex items-center justify-between">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/X_logo_2023.svg" class="h-9 w-9 object-contain" alt="Twitter">
                    <label class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" class="sr-only toggle-input">
                            <div class="block bg-gray-300 w-14 h-8 rounded-full"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-gray-400">OFF</div>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <div class="flex-1 border-l pl-20">
            <h2 class="text-3xl font-semibold mb-8 text-center">Redirect Target</h2>
            <div class="space-y-10">
                <div class="flex flex-col gap-2">
                    <div class="flex items-center justify-between">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Google_Classroom_Logo.png" class="h-16 w-16" alt="Classroom">
                        <label class="flex items-center cursor-pointer">
                            <div class="relative">
                                <input type="radio" name="target" class="sr-only redirect-toggle" checked>
                                <div class="block bg-gray-300 w-14 h-8 rounded-full transition"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full"></div>
                            </div>
                        </label>
                    </div>
                    <p class="text-sm font-bold">Enter URL :</p>
                    <input type="text" class="border rounded p-1 w-full" placeholder="https://...">
                </div>

                <div class="flex flex-col gap-2">
                    <div class="flex items-center justify-between">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Cisco_Webex_logo_-_Brandlogos.net.svg" class="h-16 w-32" alt="Zoom">
                        <label class="flex items-center cursor-pointer">
                            <div class="relative">
                                <input type="radio" name="target" class="sr-only redirect-toggle">
                                <div class="block bg-gray-300 w-14 h-8 rounded-full transition"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full"></div>
                            </div>
                        </label>
                    </div>
                    <p class="text-sm font-bold">Enter URL :</p>
                    <input type="text" class="border rounded p-1 w-full" placeholder="https://...">
                </div>
            </div>
        </div>

    </div>

    <script>
        // Mutual exclusion logic for Redirect Targets
        // Since we used type="radio", the browser handles the single selection automatically.
        // We just add a listener if you want to trigger visual cues or logic.
        const radios = document.querySelectorAll('.redirect-toggle');
        radios.forEach(radio => {
            radio.addEventListener('change', () => {
                // You can add logic here to save the selection
                console.log("Redirect target changed");
            });
        });
    </script>
</body>
</html>
